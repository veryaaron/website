    <style>
        .estatutos-page {
            padding: 8rem 0 4rem;
        }

        .estatutos-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .estatutos-header h1 {
            margin-bottom: 1rem;
        }

        .estatutos-intro {
            color: var(--color-text-muted);
            margin-bottom: 2rem;
        }

        .back-link {
            display: inline-flex;

            font-size: 0.9rem;
        }
        .back-link:hover { color: var(--color-accent); }

        .pdf-container {

            border: 1px solid var(--color-border);

        }

        .pdf-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

            text-align: center;
            margin-top: 1.5rem;

    <div id="shared-header"></div>
